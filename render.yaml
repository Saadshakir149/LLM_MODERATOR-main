services:
  - type: web
    name: llm-moderator-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY  # ✅ ADDED - since you're using Groq
        sync: false
      - key: OPENAI_API_KEY  # optional
        sync: false
      - key: ADMIN_TOKEN  # required: gates all /admin/* routes via the X-Admin-Token header
        sync: false
      - key: FRONTEND_URL
        value: https://llm-moderator-main-do.vercel.app/